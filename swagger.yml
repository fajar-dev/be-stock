            data:
              type: array
              items:
                $ref: "#/components/schemas/StockVariantObject"

    # ── STOCK VARIANT ITEM ─────────────────────────────────────────────────────
    StockVariantItemObject:
      type: object
      properties:
        id:
          type: integer
          example: 1
        stockVariantId:
          type: integer
          example: 1
        stockVariant:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            code:
              type: string
            name:
              type: string
        serialNumber:
          type: string
          nullable: true
          example: SN-00001
        lot:
          type: string
          nullable: true
          example: LOT-2025-001
        quantity:
          type: integer
          example: 50
        createdAt:
          type: string
          format: date-time
          example: "2025-01-01T00:00:00.000Z"

    CreateStockVariantItemRequest:
      type: object
      required:
        - stockVariantId
        - item
      properties:
        stockVariantId:
          type: integer
          description: ID varian stok
          example: 1
        item:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              lot:
                type: string
                nullable: true
                maxLength: 100
                description: Diisi untuk managementModel LOT
                example: LOT-2025-001
              serialNumber:
                type: string
                nullable: true
                maxLength: 100
                description: Diisi untuk managementModel SERIAL_NUMBER
                example: SN-00001
              quantity:
                type: integer
                minimum: 1
                description: Jumlah item. Untuk SERIAL_NUMBER otomatis 1.
                example: 50

    StockVariantItemSuccessResponse:
      allOf:
