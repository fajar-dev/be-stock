          type: integer
          example: 200
        message:
          type: string
          example: Data retrieved successfully

    PaginatedWrapper:
      allOf:
        - $ref: "#/components/schemas/SuccessWrapper"
        - type: object
          properties:
            meta:
              type: object
              properties:
                total:
                  type: integer
                  example: 50
                perPage:
                  type: integer
                  example: 10
                currentPage:
                  type: integer
                  example: 1
                lastPage:
                  type: integer
                  example: 5
                from:
                  type: integer
                  example: 1
                to:
                  type: integer
                  example: 10

