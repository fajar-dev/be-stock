openapi: 3.0.3
info:
  title: Stock API
  description: |
    API manajemen stok barang untuk Nusanet.

  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Local development

tags:
  - name: Unit
    description: Satuan barang (Meter, Rol, Buah, dll). Saat unit dibuat, base conversion (1:1) otomatis terbentuk.
  - name: Conversion
    description: Konversi antar satuan (misal 1 Rol = 100 Meter)
  - name: Stock
    description: Data barang/stok. Upload foto via multipart/form-data.
  - name: StockVariant
    description: Varian dari sebuah stok. Dibuat secara bulk (array).
  - name: StockVariantItem
    description: Item stok variant (LOT / SERIAL_NUMBER). Dibuat secara bulk per variant.
  - name: Branch
    description: Data cabang/branch
  - name: Additional
    description: Endpoint helper read-only untuk kebutuhan dropdown dan pencarian

paths:
  # ─── UNIT ────────────────────────────────────────────────────────────────────
  /unit:
    get:
      tags: [Unit]
      summary: List semua unit
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - in: query
          name: q
          schema:
            type: string
          description: Cari berdasarkan nama
        - in: query
          name: is_active
          schema:
            type: boolean
          description: Filter berdasarkan status aktif
      responses:
        "200":
          description: Berhasil mengambil data unit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitPaginatedResponse"
              example:
                success: true
                statusCode: 200
                message: Units retrieved successfully
                data:
                  - id: 1
                    name: Meter
                    isActive: true
                    stocks: []
                    createdAt: "2025-01-01T00:00:00.000Z"
                meta:
                  total: 1
                  perPage: 10
                  currentPage: 1
                  lastPage: 1
                  from: 1
                  to: 1

    post:
      tags: [Unit]
      summary: Buat unit baru
      description: Membuat unit baru. Base conversion (1:1) akan otomatis terbentuk bersamaan.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUnitRequest"
            example:
              name: Meter
              isActive: true
      responses:
        "201":
          description: Unit berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitSuccessResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /unit/{id}:
    get:
      tags: [Unit]
      summary: Detail unit
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Detail unit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitSuccessResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── CONVERSION ──────────────────────────────────────────────────────────────
  /conversion:
    get:
      tags: [Conversion]
      summary: List semua konversi
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Berhasil mengambil data konversi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversionPaginatedResponse"
              example:
                success: true
                statusCode: 200
                message: Conversions retrieved successfully
                data:
                  - id: 1
                    name: Rol ke Meter
                    isActive: true
                    unitBasic:
                      id: 2
                      name: Rol
                    value: 100
                    unitConversion:
                      id: 1
                      name: Meter
                    remark: 1 Rol = 100 Meter
                    stocks: []
                    createdAt: "2025-01-01T00:00:00.000Z"
                meta:
                  total: 1
                  perPage: 10
                  currentPage: 1
                  lastPage: 1
                  from: 1
                  to: 1

    post:
      tags: [Conversion]
      summary: Buat konversi baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversionRequest"
            example:
              name: Rol ke Meter
              unitBasicId: 2
              value: 100
              unitConversionId: 1
      responses:
        "201":
          description: Konversi berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversionSuccessResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /conversion/{id}:
    get:
      tags: [Conversion]
      summary: Detail konversi
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Detail konversi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversionSuccessResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── STOCK ───────────────────────────────────────────────────────────────────
  /stock:
    get:
      tags: [Stock]
      summary: List semua stok
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - in: query
          name: q
          schema:
            type: string
          description: Cari berdasarkan nama atau kode
      responses:
        "200":
          description: Berhasil mengambil data stok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockPaginatedResponse"

    post:
      tags: [Stock]
      summary: Buat stok baru
      description: |
        Membuat stok baru. Menggunakan `multipart/form-data` karena mendukung upload foto ke MinIO.

        Field `conversionUnit` dikirim sebagai multiple form values dengan key yang sama, contoh:
        `conversionUnit=1&conversionUnit=2`
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateStockRequest"
      responses:
        "201":
          description: Stok berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /stock/{id}:
    get:
      tags: [Stock]
      summary: Detail stok
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Detail stok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSuccessResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── STOCK VARIANT ────────────────────────────────────────────────────────────
  /stock/{stockId}/stock-variant:
    get:
      tags: [StockVariant]
      summary: List varian berdasarkan stok
      parameters:
        - in: path
          name: stockId
          required: true
          schema:
            type: integer
          description: ID stok
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Berhasil mengambil varian stok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockVariantPaginatedResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /stock-variant:
    get:
      tags: [StockVariant]
      summary: List semua varian stok
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Berhasil mengambil semua varian stok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockVariantPaginatedResponse"

    post:
      tags: [StockVariant]
      summary: Buat varian stok baru (bulk)
      description: |
        Membuat beberapa varian sekaligus untuk satu stok. Field `variant` adalah array minimal 1 item.
        Code varian harus unik.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStockVariantRequest"
            example:
              stockId: 1
              variant:
                - code: VAR-001
                  name: Kabel UTP Cat6 - Box A
                  branchId: 2
                  description: Box isi 305 meter
                - code: VAR-002
                  name: Kabel UTP Cat6 - Box B
                  branchId: 3
      responses:
        "201":
          description: Varian stok berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockVariantCollectionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /stock-variant/{id}:
    get:
      tags: [StockVariant]
      summary: Detail varian stok
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Detail varian stok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockVariantSuccessResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── STOCK VARIANT ITEM ───────────────────────────────────────────────────────
  /stock-variant/{variantId}/stock-variant-item:
    get:
      tags: [StockVariantItem]
      summary: List item berdasarkan varian
      parameters:
        - in: path
          name: variantId
          required: true
          schema:
            type: integer
          description: ID varian stok
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Berhasil mengambil item varian
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockVariantItemPaginatedResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /stock-variant-item:
    get:
      tags: [StockVariantItem]
      summary: List semua item stok variant
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Berhasil mengambil semua item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockVariantItemPaginatedResponse"

    post:
      tags: [StockVariantItem]
      summary: Tambah item ke varian (bulk)
      description: |
        Menambah item ke satu varian stok secara bulk. Field `item` adalah array minimal 1 item.

        - Untuk **LOT**: isi `lot` dan `quantity`
        - Untuk **SERIAL_NUMBER**: isi `serialNumber` saja (quantity otomatis 1)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStockVariantItemRequest"
            examples:
              lot:
                summary: LOT
                value:
                  stockVariantId: 1
                  item:
                    - lot: LOT-2025-001
                      quantity: 50
                    - lot: LOT-2025-002
                      quantity: 30
              serial_number:
                summary: SERIAL_NUMBER
                value:
                  stockVariantId: 2
                  item:
                    - serialNumber: SN-00001
                    - serialNumber: SN-00002
      responses:
        "201":
          description: Item berhasil ditambahkan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockVariantItemCollectionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /stock-variant-item/{id}:
    get:
      tags: [StockVariantItem]
      summary: Detail item stok variant
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Detail item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockVariantItemSuccessResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── BRANCH ──────────────────────────────────────────────────────────────────
  /branch:
    get:
      tags: [Branch]
      summary: List semua branch
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - in: query
          name: q
          schema:
            type: string
          description: Cari berdasarkan nama atau kode
      responses:
        "200":
          description: Berhasil mengambil data branch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchPaginatedResponse"
              example:
                success: true
                statusCode: 200
                message: Branches retrieved successfully
                data:
                  - id: 1
                    code: JKT-01
                    name: Jakarta Pusat
                    createdAt: "2025-01-01T00:00:00.000Z"
                    updatedAt: "2025-01-01T00:00:00.000Z"
                meta:
                  total: 1
                  perPage: 10
                  currentPage: 1
                  lastPage: 1
                  from: 1
                  to: 1

    post:
      tags: [Branch]
      summary: Buat branch baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchRequest"
            example:
              code: JKT-01
              name: Jakarta Pusat
      responses:
        "201":
          description: Branch berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchSuccessResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /branch/{id}:
    get:
      tags: [Branch]
      summary: Detail branch
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Detail branch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchSuccessResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── ADDITIONAL ──────────────────────────────────────────────────────────────
  /additional/conversion:
    get:
      tags: [Additional]
      summary: Cari konversi (non-base) untuk dropdown
      description: Mengembalikan daftar konversi yang bukan base conversion. Cocok untuk select/autocomplete.
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Cari berdasarkan nama konversi
      responses:
        "200":
          description: Daftar konversi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdditionalListResponse"
              example:
                success: true
                statusCode: 200
                message: Conversions retrieved successfully
                data:
                  - id: 1
                    name: Rol ke Meter
                  - id: 2
                    name: Box ke Buah

  /additional/base-conversion:
    get:
      tags: [Additional]
      summary: Cari base conversion untuk dropdown
      description: Mengembalikan daftar base conversion (1:1). Digunakan saat memilih satuan dasar stok.
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Cari berdasarkan nama
      responses:
        "200":
          description: Daftar base conversion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdditionalListResponse"
              example:
                success: true
                statusCode: 200
                message: Base conversions retrieved successfully
                data:
                  - id: 1
                    name: Meter
                  - id: 2
                    name: Rol

  /additional/branch:
    get:
      tags: [Additional]
      summary: Cari branch untuk dropdown
      description: Mengembalikan daftar branch. Cocok untuk select/autocomplete.
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Cari berdasarkan nama atau kode
      responses:
        "200":
          description: Daftar branch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdditionalBranchListResponse"
              example:
                success: true
                statusCode: 200
                message: Branches retrieved successfully
                data:
                  - id: 1
                    code: JKT-01
                    name: Jakarta Pusat
                  - id: 2
                    code: BDG-01
                    name: Bandung

# ─── COMPONENTS ──────────────────────────────────────────────────────────────
components:
  parameters:
    IdParam:
      in: path
      name: id
      required: true
      schema:
        type: integer
      description: ID resource

    PageParam:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Halaman

    LimitParam:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      description: Jumlah item per halaman (maks 100)

  # ─── RESPONSES ─────────────────────────────────────────────────────────────
  responses:
    NotFound:
      description: Resource tidak ditemukan
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            statusCode: 404
            message: Resource not found

    BadRequest:
      description: Request tidak valid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            statusCode: 400
            message: Bad request

    Conflict:
      description: Resource sudah ada (duplikat)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            statusCode: 409
            message: Code already exists

    ValidationError:
      description: Validasi gagal
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
          example:
            success: false
            statusCode: 422
            message: Validation failed
            errors:
              - field: name
                message: String must contain at least 1 character(s)

  # ─── SCHEMAS ───────────────────────────────────────────────────────────────
  schemas:
    # Enums
    ItemType:
      type: string
      enum:
        - Peralatan
        - setup
        - paket
        - bukan stock
      example: Peralatan

    ToolType:
      type: string
      enum:
        - Access Point
        - Adaptor
        - Aksesoris
        - Antenna
        - Anti Petir
        - Asset
        - Camera
        - Extender
        - FO Splicing Machine
        - Homeplug
        - Jasa
        - Kabel Fiber
        - Kabel Lan
        - Kabel Power
        - Lan Card
        - Mini Pci
        - Modem
        - Powerline
        - Radio
        - Router
        - Server
        - Switch Hub
        - Telepon
        - Vpn
        - Wifi Usb
      example: Kabel Lan

    Category:
      type: string
      enum:
        - Aset
        - Biaya
      example: Aset

    ManagementModel:
      type: string
      enum:
        - UNIK
        - LOT
        - SERIAL_NUMBER
      example: UNIK

    # ── UNIT ───────────────────────────────────────────────────────────────────
    UnitObject:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Meter
        isActive:
          type: boolean
          example: true
        stocks:
          type: array
          description: Stok yang menggunakan unit ini sebagai satuan dasar
          items:
            type: object
            properties:
              id:
                type: integer
              code:
                type: string
              name:
                type: string
        createdAt:
          type: string
          format: date-time
          example: "2025-01-01T00:00:00.000Z"

    CreateUnitRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: Meter
        isActive:
          type: boolean
          default: true

    UnitSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessWrapper"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UnitObject"

    UnitPaginatedResponse:
      allOf:
        - $ref: "#/components/schemas/PaginatedWrapper"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/UnitObject"

    # ── CONVERSION ─────────────────────────────────────────────────────────────
    ConversionObject:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Rol ke Meter
        isActive:
          type: boolean
          example: true
        unitBasic:
          type: object
          nullable: true
          description: Satuan asal (pembilang)
          properties:
            id:
              type: integer
            name:
              type: string
        value:
          type: number
          example: 100
        unitConversion:
          type: object
          nullable: true
          description: Satuan tujuan (penyebut)
          properties:
            id:
              type: integer
            name:
              type: string
        remark:
          type: string
          description: Keterangan human-readable (e.g. "1 Rol = 100 Meter")
          example: 1 Rol = 100 Meter
        stocks:
          type: array
          description: Stok yang menggunakan konversi ini
          items:
            type: object
            properties:
              id:
                type: integer
              code:
                type: string
              name:
                type: string
        createdAt:
          type: string
          format: date-time
          example: "2025-01-01T00:00:00.000Z"

    CreateConversionRequest:
      type: object
      required:
        - name
        - unitBasicId
        - value
        - unitConversionId
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
          example: Rol ke Meter
        unitBasicId:
          type: integer
          description: ID satuan asal
          example: 2
        value:
          type: number
          description: Nilai konversi (harus > 0)
          example: 100
        unitConversionId:
          type: integer
          description: ID satuan tujuan
          example: 1

    ConversionSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessWrapper"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ConversionObject"

    ConversionPaginatedResponse:
      allOf:
        - $ref: "#/components/schemas/PaginatedWrapper"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ConversionObject"

    # ── STOCK ──────────────────────────────────────────────────────────────────
    StockObject:
      type: object
      properties:
        id:
          type: integer
          example: 1
        code:
          type: string
          example: STK-001
        name:
          type: string
          example: Kabel UTP Cat6
        managementModel:
          $ref: "#/components/schemas/ManagementModel"
        itemType:
          $ref: "#/components/schemas/ItemType"
        toolType:
          $ref: "#/components/schemas/ToolType"
        category:
          $ref: "#/components/schemas/Category"
        description:
          type: string
          nullable: true
          example: Kabel jaringan UTP kategori 6
        photo:
          type: string
          nullable: true
          description: URL foto dari MinIO (public URL atau presigned URL)
          example: "http://localhost:9000/stock-app/stocks/1234567890-123.jpg"
        baseConversion:
          type: object
          nullable: true
          description: Satuan dasar stok ini
          properties:
            id:
              type: integer
            name:
              type: string
        conversions:
          type: array
          description: Daftar konversi satuan yang diasosiasikan dengan stok ini
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              remark:
                type: string
                example: 1 Rol = 100 Meter
        createdAt:
          type: string
          format: date-time
          example: "2025-01-01T00:00:00.000Z"

    CreateStockRequest:
      type: object
      required:
        - code
        - name
        - managementModel
        - baseConversionId
        - itemType
        - toolType
        - category
      properties:
        code:
          type: string
          minLength: 1
          example: STK-001
        name:
          type: string
          minLength: 1
          example: Kabel UTP Cat6
        managementModel:
          $ref: "#/components/schemas/ManagementModel"
        baseConversionId:
          type: string
          description: ID base conversion (satuan dasar). Dikirim sebagai string karena form-data.
          example: "1"
        itemType:
          $ref: "#/components/schemas/ItemType"
        toolType:
          $ref: "#/components/schemas/ToolType"
        category:
          $ref: "#/components/schemas/Category"
        photo:
          type: string
          format: binary
          description: File foto produk (opsional). Akan diupload ke MinIO.
        description:
          type: string
          example: Kabel jaringan UTP kategori 6
        conversionUnit:
          type: array
          description: ID konversi yang diasosiasikan dengan stok ini (opsional)
          items:
            type: integer
          example: [1, 2]

