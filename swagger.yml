    # ── STOCK VARIANT ──────────────────────────────────────────────────────────
    StockVariantObject:
      type: object
      properties:
        id:
          type: integer
          example: 1
        code:
          type: string
          example: VAR-001
        name:
          type: string
          example: Kabel UTP Cat6 - 1 Box
        description:
          type: string
          nullable: true
          example: Box isi 305 meter
        stock:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            code:
              type: string
            name:
              type: string
            managementModel:
              $ref: "#/components/schemas/ManagementModel"
        createdAt:
          type: string
          format: date-time
          example: "2025-01-01T00:00:00.000Z"

    CreateStockVariantRequest:
      type: object
      required:
        - stockId
        - variant
      properties:
        stockId:
          type: integer
          description: ID stok induk
          example: 1
        variant:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - code
              - name
              - branchId
            properties:
              code:
                type: string
                minLength: 1
                maxLength: 50
                example: VAR-001
              name:
                type: string
                minLength: 1
                maxLength: 150
                example: Kabel UTP Cat6 - Box A
              branchId:
                type: integer
                description: ID branch. Alokasi quantity 0 otomatis dibuat untuk branch ini.
                example: 2
              description:
                type: string
                nullable: true
                example: Box isi 305 meter

    StockVariantSuccessResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessWrapper"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/StockVariantObject"

    StockVariantCollectionResponse:
      allOf:
